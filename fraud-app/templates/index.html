<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Fraud Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1e3a8a, #0d9488);
            padding: 15px 30px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .logo h2 {
            font-size: 18px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: 0 0 25px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Header */
        .form-header {
            background: linear-gradient(135deg, #1e3a8a, #0d9488);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .form-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .form-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        /* Form Body */
        .form-body {
            padding: 40px;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 25px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        label i {
            margin-right: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
        }

        /* Radio Group */
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 10px 0;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #1e3a8a, #0d9488);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(13,148,136,0.4);
        }

        /* Result Section */
        .result-card {
            background: white;
            border-radius: 25px;
            margin-top: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            display: none;
        }

        .result-card.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fraud-result {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
        }

        .fraud-result.fraud {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            border: 2px solid #dc2626;
        }

        .fraud-result.normal {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 2px solid #10b981;
        }

        .result-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .result-status {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-score {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .result-details {
            text-align: left;
            background: rgba(255,255,255,0.7);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .result-details h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .result-details p {
            margin: 8px 0;
            font-size: 14px;
        }

        .result-details ul {
            margin-left: 20px;
            margin-top: 10px;
        }

        .result-details li {
            margin: 5px 0;
            font-size: 14px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }
    </style>
</head>

    <script>
        // Check login
       
        // Display user name
        const userName = localStorage.getItem('userName') || 'User';
        document.getElementById('userNameDisplay').innerHTML = `👤 ${userName}`;
		// ==========================================
// CLAIM FORM SUBMIT
// ==========================================
// ==========================================
// CLAIM FORM SUBMIT
// ==========================================

document.getElementById('claimForm')
.addEventListener('submit', async function(e) {

    e.preventDefault();

    // ==========================================
    // CREATE PAYLOAD
    // ==========================================

    const claimData = {

        IP_CLM_ID: document.getElementById('IP_CLM_ID').value,

        BENE_SEX_IDENT_CD: parseInt(
            document.getElementById('BENE_SEX_IDENT_CD').value
        ),

        BENE_AGE_CAT_CD: parseInt(
            document.getElementById('BENE_AGE_CAT_CD').value
        ),

        IP_CLM_BASE_DRG_CD: parseInt(
            document.getElementById('IP_CLM_BASE_DRG_CD').value
        ),

        IP_CLM_ICD9_PRCDR_CD: parseInt(
            document.getElementById('IP_CLM_ICD9_PRCDR_CD').value
        ),

        IP_CLM_DAYS_CD: parseInt(
            document.getElementById('IP_CLM_DAYS_CD').value
        ),

        IP_DRG_QUINT_PMT_AVG: parseFloat(
            document.getElementById('IP_DRG_QUINT_PMT_AVG').value
        ),

        IP_DRG_QUINT_PMT_CD: parseInt(
            document.getElementById('IP_DRG_QUINT_PMT_CD').value
        )
    };

    console.log('Payload:', claimData);

    try {

        // ==========================================
        // API REQUEST
        // ==========================================

        const response = await fetch('/predict', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify(claimData)
        });

        // ==========================================
        // GET RESPONSE
        // ==========================================

        const result = await response.json();

        console.log('API Result:', result);

        // ==========================================
        // RESULT ELEMENTS
        // ==========================================

        const resultCard =
            document.getElementById('resultCard');

        const resultContent =
            document.getElementById('resultContent');

        // ==========================================
        // SHOW RESULT CARD
        // ==========================================

        resultCard.style.display = 'block';

        resultCard.classList.add('show');

        // ==========================================
        // FRAUD STATUS
        // ==========================================

        const isFraud =
            result.fraud_label === 'Fraud';

        // ==========================================
        // RESULT HTML
        // ==========================================

        resultContent.innerHTML = `

<div class="fraud-result ${isFraud ? 'fraud' : 'normal'}">

    <!-- STATUS -->
    <div class="result-icon">
        ${isFraud ? '🚨' : '✅'}
    </div>

    <div class="result-status">
        ${result.fraud_label}

    <!-- PROGRESS BAR -->

    <div style="
        width:100%;
        background:#ddd;
        border-radius:12px;
        overflow:hidden;
        height:32px;
        margin-top:20px;
        margin-bottom:25px;
    ">

        <div style="
            width:${result.fraud_score}%;
            background:${isFraud ? '#dc2626' : '#16a34a'};
            height:100%;
            color:white;
            text-align:center;
            line-height:32px;
            font-weight:bold;
            transition:0.5s;
        ">

            ${result.fraud_score}%

        </div>

    </div>

    <!-- ANALYTICS GRID -->

    <div style="
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:15px;
        margin-top:20px;
    ">

        <div style="
            background:white;
            padding:15px;
            border-radius:12px;
            text-align:left;
        ">
            <h4>⚠️ Risk Level</h4>
            <p>${result.risk_level}</p>
        </div>

        <div style="
            background:white;
            padding:15px;
            border-radius:12px;
            text-align:left;
        ">
            <h4>📊 Severity</h4>
            <p>${result.anomaly_severity}</p>
        </div>

        <div style="
            background:white;
            padding:15px;
            border-radius:12px;
            text-align:left;
        ">
            <h4>💰 Financial Risk</h4>
            <p>$${result.estimated_financial_risk}</p>
        </div>

        <div style="
            background:white;
            padding:15px;
            border-radius:12px;
            text-align:left;
        ">
            <h4>🧠 Confidence</h4>
            <p>${result.confidence_level}%</p>
        </div>

        <div style="
            background:white;
            padding:15px;
            border-radius:12px;
            text-align:left;
        ">
            <h4>🏥 Complexity</h4>
            <p>${result.claim_complexity}</p>
        </div>

        <div style="
            background:white;
            padding:15px;
            border-radius:12px;
            text-align:left;
        ">
            <h4>📌 Claim ID</h4>
            <p>${result.IP_CLM_ID}</p>
        </div>

    </div>

    <!-- RECOMMENDATION -->

    <div class="result-details" style="margin-top:25px;">

        <h4>💡 Recommended Action</h4>

        <p style="
            margin-top:10px;
            font-weight:bold;
            color:${isFraud ? '#dc2626' : '#16a34a'};
        ">
            ${result.recommended_action}
        </p>

    </div>

    <!-- FRAUD INDICATORS -->

    <div class="result-details" style="margin-top:20px;">

        <h4>🚩 Fraud Indicators</h4>

        <ul style="margin-top:15px;">

            ${
                result.fraud_indicators
                .map(item => `
                    <li style="margin-bottom:8px;">
                        ${item}
                    </li>
                `)
                .join('')
            }

        </ul>

    </div>

    <!-- FINAL MESSAGE -->

    <div style="
        margin-top:25px;
        padding:15px;
        border-radius:12px;
        background:${isFraud ? '#fff1f2' : '#f0fdf4'};
        color:${isFraud ? '#dc2626' : '#16a34a'};
        font-weight:bold;
    ">

        ${
            isFraud
            ? '⚠️ Suspicious claim detected. Manual verification strongly recommended.'
            : '✅ Claim appears normal based on PCA anomaly detection analysis.'
        }

    </div>

</div>
`;

        // ==========================================
        // AUTO SCROLL
        // ==========================================

        resultCard.scrollIntoView({
            behavior: 'smooth'
        });

    }

    catch(error) {

        console.error(error);

        alert('API Error');
    }
});
    </script>
